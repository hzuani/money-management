<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>가계부</title>
  <link rel="manifest" href="manifest.json" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#6366f1',
          }
        }
      }
    }
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { overscroll-behavior-y: none; }
    .nav-btn.active { color: #6366f1; }
    .nav-btn.active svg { stroke: #6366f1; }
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  </style>
</head>
<body class="bg-gray-50 max-w-md mx-auto min-h-screen relative">

  <!-- 로그인 화면 -->
  <div id="login-screen" class="hidden fixed inset-0 bg-indigo-50 flex flex-col items-center justify-center z-50">
    <div class="text-center px-8">
      <div class="text-6xl mb-4">💰</div>
      <h1 class="text-3xl font-bold text-indigo-700 mb-2">가계부</h1>
      <p class="text-gray-500 mb-10">수입과 지출을 한눈에 관리하세요</p>
      <button id="google-login-btn"
        class="flex items-center gap-3 bg-white border border-gray-200 rounded-xl px-6 py-3 shadow-sm text-gray-700 font-medium w-full justify-center hover:bg-gray-50 active:bg-gray-100 transition">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.7 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16.1 19 13 24 13c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.7 29.3 4 24 4 16.3 4 9.6 8.3 6.3 14.7z"/>
          <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.3 35.3 26.8 36 24 36c-5.2 0-9.6-3-11.3-7.4l-6.5 5C9.5 39.6 16.2 44 24 44z"/>
          <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.4 4.2-4.4 5.5l6.2 5.2C36.9 36.8 44 31 44 24c0-1.3-.1-2.6-.4-3.9z"/>
        </svg>
        Google로 시작하기
      </button>
    </div>
  </div>

  <!-- 앱 본체 -->
  <div id="app" class="hidden pb-20">
    <div id="page-container"></div>
  </div>

  <!-- 하단 네비게이션 -->
  <nav id="bottom-nav" class="hidden fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white border-t border-gray-100 z-40">
    <div class="flex">
      <button class="nav-btn flex-1 flex flex-col items-center py-2 gap-0.5 text-gray-400 text-xs font-medium transition" data-page="dashboard">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        홈
      </button>
      <button class="nav-btn flex-1 flex flex-col items-center py-2 gap-0.5 text-gray-400 text-xs font-medium transition" data-page="transactions">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
        내역
      </button>
      <button class="nav-btn flex-1 flex flex-col items-center py-2 gap-0.5 text-gray-400 text-xs font-medium transition" data-page="fixed">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        고정
      </button>
      <button class="nav-btn flex-1 flex flex-col items-center py-2 gap-0.5 text-gray-400 text-xs font-medium transition" data-page="assets">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M14.8 9A2 2 0 0 0 13 8h-2a2 2 0 0 0 0 4h2a2 2 0 0 1 0 4h-2a2 2 0 0 1-1.8-1M12 7v1m0 8v1"/></svg>
        자산
      </button>
      <button class="nav-btn flex-1 flex flex-col items-center py-2 gap-0.5 text-gray-400 text-xs font-medium transition" data-page="stats">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        통계
      </button>
      <button class="nav-btn flex-1 flex flex-col items-center py-2 gap-0.5 text-gray-400 text-xs font-medium transition" data-page="settings">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        설정
      </button>
    </div>
  </nav>

  <script type="module" src="js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
